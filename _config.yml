log_path: "lillipub.log"

site_url: "http://blog.b-ark.ca"
site_location: "/home/brettk/blog"
source_location: "/home/brettk/git/blog"

media_endpoint: "http://micropub.b-ark.ca/lillipub.rb"
token_endpoint: "https://tokens.indieauth.com/token"

media_metadata: "/home/brettk/blog/assets/media.yaml"
categories: "/home/brettk/blog-site/categories.json"

git_cmd: "/usr/bin/git --work-tree=%{site_location} --git-dir=%{source_location}"
git_hook: "%{git_cmd} add %{path} && %{git_cmd} commit -m 'Micropub %{operation}' && touch %{site_location}/index.html"

commands:
  create:
    - "%{git_hook}"
  update:
    - "%{git_hook}"
  delete:
    - "%{git_hook}"

media_paths:
  images: "assets/images"
  files: "assets/files"

date_format: "%Y-%m-%d %H:%M:%S %z"

feed:
  uid: "4A75D60C-5F78-4C0C-8C6A-B3B15255B4BD"
  name: "The 'B' Ark"

front_matter:
  article:
    summary: :summary
  like:
    like_of: :like-of
  repost:
    repost_of: :repost-of
  bookmark:
    bookmark_of: :bookmark-of
  read:
    isbn: :isbn
    status: :read-status
  categories:
    tweet:
      syndicate_to: [ twitter ]
  all:
    layout: :type
    title: :name
    author: "Brett Kosinski"
    date: :published
    category: :category
    in_reply_to: :in-reply-to
    image: :photo
